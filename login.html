<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - ATELIER</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <ul class="nav-links left">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
      <div class="logo">ATELIER</div>
      <div class="nav-icons right">
        <a href="cart.html"><img src="https://api.iconify.design/ph:shopping-cart-light.svg?color=white" width="20"></a>
        <a href="favourite.html"><img src="https://api.iconify.design/ph:heart-light.svg?color=white" width="20"></a>
        <div class="user-dropdown"><button class="user-btn" aria-label="Account"><img src="https://api.iconify.design/ph:user-circle-light.svg?color=white" width="24"></button><div class="dropdown-menu"><a href="login.html" class="dropdown-item">Sign In</a><a href="login.html" class="dropdown-item highlight">Create Account</a></div></div>
      </div>
    </div>
  </nav>

  <main>
    <section class="auth-page">
      <div class="auth-container">
        <div class="auth-header reveal">
          <h1>Welcome</h1>
          <p>Enter your details to access your account</p>
        </div>

        <div class="auth-tabs reveal">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="register">Create Account</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form reveal active">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="aria.montenegro@email.com" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
          <div class="form-row-split">
            <label class="checkbox-wrap">
              <input type="checkbox">
              <span class="checkmark"></span>
              <span class="checkbox-label">Remember me</span>
            </label>
            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
          </div>
          <button type="submit" class="btn-auth">SIGN IN</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form reveal">
          <div class="form-row">
            <div class="form-group">
              <label for="register-firstname">First Name</label>
              <input type="text" id="register-firstname" placeholder="Aria" required>
            </div>
            <div class="form-group">
              <label for="register-lastname">Last Name</label>
              <input type="text" id="register-lastname" placeholder="Montenegro" required>
            </div>
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="aria.montenegro@email.com" required>
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Min. 8 characters" required>
          </div>
          <div class="form-group">
            <label for="register-confirm">Confirm Password</label>
            <input type="password" id="register-confirm" placeholder="Re-enter your password" required>
          </div>
          <label class="checkbox-wrap">
            <input type="checkbox" required>
            <span class="checkmark"></span>
            <span class="checkbox-label">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
          </label>
          <button type="submit" class="btn-auth">CREATE ACCOUNT</button>
        </form>

        <div class="auth-divider reveal">
          <span>or continue with</span>
        </div>

        <div class="social-auth reveal">
          <button class="btn-social">
            <img src="https://api.iconify.design/flat-color-icons:google.svg?color=white" width="20" height="20">
            Google
          </button>
          <button class="btn-social">
            <img src="https://api.iconify.design/logos:facebook.svg?color=white" width="20" height="20">
            Facebook
          </button>
        </div>

        <div class="auth-footer reveal">
          <p>By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="auth-footer-page">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 ATELIER. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script type="module" src="/main.js"></script>
  <script>
    // Tab switching
    const tabs = document.querySelectorAll('.auth-tab');
    const forms = document.querySelectorAll('.auth-form');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const targetTab = tab.dataset.tab;

        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        forms.forEach(form => {
          form.classList.remove('active');
          if (form.id === `${targetTab}-form`) {
            form.classList.add('active');
          }
        });
      });
    });

    // Form submission (demo)
    document.querySelectorAll('.auth-form').forEach(form => {
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const formType = form.id.includes('login') ? 'Login' : 'Registration';
        alert(`${formType} functionality would be implemented here`);
      });
    });
  </script>
</body>
</html>
