<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - ATELIER</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <ul class="nav-links left">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
      <div class="logo"><a href="index.html">ATELIER</a></div>
      <div class="nav-icons right">
        <a href="cart.html"><img src="https://api.iconify.design/ph:shopping-cart-light.svg?color=white" width="20"></a>
        <a href="favourite.html"><img src="https://api.iconify.design/ph:heart-light.svg?color=white" width="20"></a>
        <div class="user-dropdown"><button class="user-btn" aria-label="Account"><img src="https://api.iconify.design/ph:user-circle-light.svg?color=white" width="24"></button><div class="dropdown-menu"><a href="login.html" class="dropdown-item">Sign In</a><a href="login.html" class="dropdown-item highlight">Create Account</a></div></div>
      </div>
    </div>
  </nav>

  <main>
    <section class="auth-page">
      <div class="auth-container">
        <div class="auth-header reveal">
          <h1>Reset Password</h1>
          <p>Enter your email and we'll send you instructions</p>
        </div>

        <form class="auth-form reveal active" style="display: flex;">
          <div class="form-group">
            <label for="reset-email">Email Address</label>
            <input type="email" id="reset-email" placeholder="aria.montenegro@email.com" required>
          </div>
          <button type="submit" class="btn-auth" onclick="window.location.href='login.html'; return false;">SEND RESET LINK</button>
        </form>

        <div class="auth-divider reveal">
          <span>or</span>
        </div>

        <div class="auth-footer reveal">
          <p>Remember your password? <a href="login.html">Sign In</a></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="auth-footer-page">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 ATELIER. All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
